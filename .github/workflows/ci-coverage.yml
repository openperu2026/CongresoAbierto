name: CI - Coverage

on:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:

jobs:
  pr-coverage:
    name: Tests + coverage (pull_request)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.19"
          enable-cache: true

      - name: Install pytesseract
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-spa

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run coverage run \
          --source=backend/scrapers,backend/database,backend/process \
          -m pytest
          uv run coverage report --fail-under=70
          uv run coverage xml
          uv run coverage lcov

      - name: Comment PR with coverage
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage.lcov
