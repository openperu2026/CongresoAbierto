repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: no-commit-to-branch
        stages: [pre-commit, pre-push]
        args: [--branch, main, --branch, develop]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: enforce-gitflow-branch-name
        name: enforce gitflow branch naming
        entry: |
          bash -c '
            branch="$(git rev-parse --abbrev-ref HEAD)"

            if [[ "$branch" == "HEAD" ]]; then
              echo "Detached HEAD is not allowed for commits."
              exit 1
            fi

            if [[ "$branch" == "main" || "$branch" == "develop" ]]; then
              echo "Direct commits to $branch are not allowed."
              exit 1
            fi

            if [[ "$branch" =~ ^feature/[a-z0-9._-]+$ ]]; then
              exit 0
            fi

            if [[ "$branch" =~ ^hotfix/[a-z0-9._-]+$ ]]; then
              exit 0
            fi

            if [[ "$branch" =~ ^release/(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              exit 0
            fi

            echo "Invalid branch name: $branch"
            echo ""
            echo "Allowed patterns:"
            echo "  feature/<short-name>"
            echo "  hotfix/<short-name>"
            echo "  release/<major>.<minor>.<patch>"
            echo ""
            echo "Examples:"
            echo "  feature/add-login"
            echo "  hotfix/fix-payment-timeout"
            echo "  release/1.2.0"
            exit 1
          '
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
